<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- macOS (Big Sur style) variant: inset tile with soft shadow. -->
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ee2a9b"/>
      <stop offset="1" stop-color="#f76d3c"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g transform="translate(100 100) scale(0.8046875)">
    <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#sunset)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#sheen)"/>
    <g fill="#ffffff">
      <rect x="236" y="282" width="118" height="460" rx="48"/>
      <rect x="236" y="282" width="272" height="118" rx="48"/>
      <rect x="236" y="470" width="216" height="112" rx="48"/>
      <rect x="546" y="282" width="118" height="460" rx="48"/>
      <rect x="546" y="282" width="272" height="118" rx="48"/>
      <rect x="546" y="470" width="216" height="112" rx="48"/>
    </g>
    <g fill="none" stroke="#ffffff" stroke-linecap="round">
      <path d="M 862 258 A 75 75 0 0 1 937 333" stroke-width="42" stroke-opacity="0.95"/>
      <path d="M 862 198 A 135 135 0 0 1 997 333" stroke-width="38" stroke-opacity="0.55"/>
    </g>
  </g>
</svg>
