<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- macOS (Big Sur style) variant: the FF tile inset with a soft shadow.
       Geometry mirrors flurfunk.svg (tile 20..492, rx 108), scaled so the
       tile spans 824 px centered on the 1024 canvas. -->
  <defs>
    <linearGradient id="bg" x1="48" y1="28" x2="468" y2="484" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17171D"/>
      <stop offset="1" stop-color="#09090C"/>
    </linearGradient>
    <linearGradient id="ff-left" x1="78" y1="96" x2="310" y2="406" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F13AA7"/>
      <stop offset="0.52" stop-color="#FF7A35"/>
      <stop offset="1" stop-color="#FFD84D"/>
    </linearGradient>
    <linearGradient id="ff-right" x1="224" y1="96" x2="446" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD84D"/>
      <stop offset="0.55" stop-color="#FF8B35"/>
      <stop offset="1" stop-color="#F24A38"/>
    </linearGradient>
    <clipPath id="icon-clip">
      <rect x="20" y="20" width="472" height="472" rx="108"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g transform="translate(100 100) scale(1.7457627) translate(-20 -20)">
    <rect x="20" y="20" width="472" height="472" rx="108" fill="url(#bg)" filter="url(#shadow)"/>
    <g clip-path="url(#icon-clip)">
      <circle cx="86" cy="70" r="176" fill="#FFFFFF" opacity="0.025"/>
      <circle cx="438" cy="454" r="194" fill="#FF7A35" opacity="0.035"/>
    </g>

    <g transform="translate(32 32) scale(0.875)">
      <g transform="skewX(-8) translate(34 0)">
        <path d="M87 414 L151 104 H307 M119 260 H267"
              fill="none" stroke="#09090C" stroke-width="94"
              stroke-linecap="square" stroke-linejoin="round"/>
        <path d="M87 414 L151 104 H307 M119 260 H267"
              fill="none" stroke="url(#ff-left)" stroke-width="72"
              stroke-linecap="square" stroke-linejoin="round"/>

        <path d="M219 414 L283 104 H439 M251 260 H399"
              fill="none" stroke="#09090C" stroke-width="94"
              stroke-linecap="square" stroke-linejoin="round"/>
        <path d="M219 414 L283 104 H439 M251 260 H399"
              fill="none" stroke="url(#ff-right)" stroke-width="72"
              stroke-linecap="square" stroke-linejoin="round"/>
      </g>
    </g>
  </g>
</svg>
