<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Flurfunk FF Mark</title>
  <desc id="desc">Modern geometric FF monogram with a warm magenta, orange and yellow gradient on a transparent background.</desc>

  <defs>
    <linearGradient id="ff-left" x1="78" y1="96" x2="310" y2="406" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F13AA7"/>
      <stop offset="0.52" stop-color="#FF7A35"/>
      <stop offset="1" stop-color="#FFD84D"/>
    </linearGradient>
    <linearGradient id="ff-right" x1="224" y1="96" x2="446" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD84D"/>
      <stop offset="0.55" stop-color="#FF8B35"/>
      <stop offset="1" stop-color="#F24A38"/>
    </linearGradient>
  </defs>

  <g transform="skewX(-8) translate(34 0)">
    <path d="M87 414 L151 104 H307 M119 260 H267"
          fill="none" stroke="url(#ff-left)" stroke-width="72"
          stroke-linecap="square" stroke-linejoin="round"/>
    <path d="M219 414 L283 104 H439 M251 260 H399"
          fill="none" stroke="url(#ff-right)" stroke-width="72"
          stroke-linecap="square" stroke-linejoin="round"/>
  </g>
</svg>
